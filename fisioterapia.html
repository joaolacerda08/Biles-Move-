<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fisioterapia</title>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(18, 18, 18, 0.86);
            --border: rgba(212, 175, 55, 0.28);
            --text: #f6e9be;
            --text-muted: #bdb08a;
            --gold: #d4af37;
            --green: #1e3f2d;
            --blue: #0f3d6f;
            --purple: #472a56;
            --shadow: 0 26px 68px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(212,175,55,0.14), transparent 20%),
                        radial-gradient(circle at bottom right, rgba(71, 38, 114, 0.18), transparent 22%),
                        linear-gradient(180deg, #070707 0%, #070607 100%);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .page-wrapper {
            max-width: 980px;
            margin: 32px auto;
            padding: 0 20px 40px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 32px;
        }

        h1 {
            font-size: clamp(2rem, 3.4vw, 3rem);
            text-align: center;
            margin-bottom: 18px;
            letter-spacing: 0.12em;
        }

        .headline {
            display: block;
            text-align: center;
            color: var(--gold);
            margin-bottom: 28px;
            font-size: 0.96rem;
            letter-spacing: 0.18em;
        }

        .content {
            display: grid;
            gap: 28px;
        }

        .info-block {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 22px;
            padding: 24px;
        }

        p {
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 18px;
        }

        ul {
            list-style: inside disc;
            color: var(--text);
            padding-left: 18px;
            margin-bottom: 18px;
        }

        ul li {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--gold);
        }

        input,
        button {
            width: 100%;
            border-radius: 16px;
            border: 1px solid rgba(212,175,55,0.22);
            padding: 14px 16px;
            font-size: 1rem;
            color: var(--text);
            background: rgba(255,255,255,0.05);
            outline: none;
        }

        input:focus,
        button:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212,175,55,0.12);
        }

        input[type="submit"] {
            background: linear-gradient(135deg, rgba(212,175,55,0.95), rgba(255,214,95,0.75));
            color: #080808;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }

        input[type="submit"]:hover {
            filter: brightness(1.04);
        }

        .total-box {
            margin-top: 14px;
            padding: 18px 20px;
            border-radius: 22px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(212,175,55,0.18);
        }

        .total-box h2 {
            font-size: 1.1rem;
            letter-spacing: 0.04em;
            color: var(--text);
        }

        .total-box strong {
            color: var(--gold);
        }

        @media (max-width: 720px) {
            .page-wrapper {
                margin: 20px auto;
                padding: 0 14px 30px;
            }

            .card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="card">
            <span class="headline">RESERVE SUA SESSÃO</span>
            <h1>Fisioterapia Premium</h1>
            <div class="content">
                <div>
                    <p>Agende sua sessão de fisioterapia com atenção personalizada, conforto e resultados rápidos. Preencha os dados abaixo para confirmar sua reserva.</p>
                </div>
                <section class="info-block">
                    <form id="formulario" method="GET" action="fiseoconcluida.html">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" required>

                        <label for="data">Data</label>
                        <input type="date" id="data" name="data" required>

                        <label for="horario">Horário</label>
                        <input type="time" id="horario" name="horario" min="07:00" max="19:00" step="1800" required>

                        <label for="quantidade">Quantidade de seções</label>
                        <input type="number" min="0" max="5" id="quantidade" name="quantidade" required>

                        <div class="total-box">
                            <h2>Valor total: <strong id="valor-total">R$ 40</strong></h2>
                        </div>

                        <input type="submit" name="send" id="enviar" value="Enviar">
                    </form>
                </section>
            </div>
        </div>
    </div>

    <script>
        const quantidadeInput = document.getElementById('quantidade');
        const valorTotalElement = document.getElementById('valor-total');
        const valorPorSecao = 40;

        const atualizarValorTotal = () => {
            let quantidade = Number(quantidadeInput.value) || 0;
            if (quantidade < 0) quantidade = 0;
            if (quantidade > 5) quantidade = 5;
            quantidadeInput.value = quantidade;

            const total = quantidade * valorPorSecao;
            valorTotalElement.textContent = `R$ ${total}`;
        };

        quantidadeInput.addEventListener('change', atualizarValorTotal);
        quantidadeInput.addEventListener('input', atualizarValorTotal);

        atualizarValorTotal();
    </script>
</body>
</html>
